name: hardened-postgres
tag: "18"
latest: true
description: Hardened PostgreSQL 18 server on Alpine (distroless, operator-init)

components:
  - postgres-18

expose:
  - 5432

run_as: postgres
entrypoint: ["/usr/libexec/postgresql18/postgres"]

distroless: true
ipv6: false

