name: cache-valkey
version: "0.1.0"
description: Hardened Valkey cache on Alpine

components:
  - valkey

expose:
  - 6379

run_as: valkey
entrypoint: ["/usr/bin/valkey-server", "/etc/valkey/valkey.conf"]

distroless: true
ipv6: false

labels:
  org.opencontainers.image.title: cache-valkey
  org.opencontainers.image.description: Hardened Valkey on Alpine
  org.opencontainers.image.vendor: IronVigil
  org.opencontainers.image.source: https://github.com/Iron-Vigil/forge
