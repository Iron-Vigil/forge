name: runtime-aspnet8
version: "0.1.0"
description: Hardened ASP.NET Core 8 runtime on Alpine

components:
  - aspnet-runtime8

expose:
  - 8080

run_as: app
entrypoint: ["/usr/lib/dotnet/dotnet"]

distroless: true
ipv6: false

