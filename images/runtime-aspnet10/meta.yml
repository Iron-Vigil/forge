name: runtime-aspnet10
version: "0.1.0"
description: Hardened ASP.NET Core 10 runtime on Alpine

components:
  - aspnet-runtime10

expose:
  - 8080

run_as: app
entrypoint: ["/usr/lib/dotnet/dotnet"]

distroless: true
ipv6: false

