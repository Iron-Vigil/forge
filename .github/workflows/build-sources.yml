name: Build Sources

on:
  push:
    branches: [main]
    paths:
      - 'sources/**'
  workflow_dispatch:
    inputs:
      source:
        description: 'Source name to build (e.g. nginx). Leave blank to build all changed.'
        required: false
        type: string
      force_all:
        description: 'Force rebuild of all sources'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  id-token: write
  actions: write    # dispatch build.yml once source artifacts are published

jobs:
  detect:
    name: Detect changed sources
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set_matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Build source matrix
        id: set_matrix
        env:
          SRC: ${{ inputs.source }}
        run: |
          # SRC via env, never interpolated into the shell — avoids injection
          if [ -n "$SRC" ]; then
            m=$(jq -nc --arg s "$SRC" '{source:[$s]}')
            echo "matrix=${m}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ inputs.force_all }}" = "true" ]; then
            sources=$(find sources/ -name "version" -exec dirname {} \; | xargs -I{} basename {} | jq -Rnc '[inputs]')
            echo "matrix={\"source\":${sources}}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=$(git diff --name-only HEAD~1 HEAD | grep '^sources/' | cut -d/ -f2 | sort -u | jq -Rnc '[inputs]')
          if [ "$changed" = "[]" ]; then
            echo "matrix={\"source\":[]}" >> "$GITHUB_OUTPUT"
          else
            echo "matrix={\"source\":${changed}}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.source }}
    needs: detect
    if: needs.detect.outputs.matrix != '{"source":[]}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binary
        run: |
          mkdir -p /tmp/output
          docker run --rm \
            -v "$PWD/sources/${{ matrix.source }}:/build:ro" \
            -v "/tmp/output:/output" \
            alpine:3.21 \
            sh /build/build.sh

      - name: Package as OCI artifact
        id: package
        run: |
          VERSION=$(cat "sources/${{ matrix.source }}/version")
          BINARY=$(cat "sources/${{ matrix.source }}/binary")
          RUNTIME_DEPS=$(cat "sources/${{ matrix.source }}/runtime-deps" 2>/dev/null || echo "none")
          IMAGE="ghcr.io/iron-vigil/forge/src/${{ matrix.source }}"

          printf 'FROM scratch\nCOPY . /\n' > /tmp/Dockerfile.src

          docker build \
            --label "org.opencontainers.image.source=https://github.com/Iron-Vigil/forge" \
            --label "org.opencontainers.image.vendor=IronVigil" \
            --label "org.opencontainers.image.title=src-${{ matrix.source }}" \
            --label "org.opencontainers.image.version=${VERSION}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.description=Source-built ${{ matrix.source }} binary. Runtime deps: ${RUNTIME_DEPS}" \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:latest" \
            -f /tmp/Dockerfile.src \
            /tmp/output

          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:latest"

          digest=$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE}:${VERSION}")
          echo "ARTIFACT_DIGEST=${digest}" >> "$GITHUB_ENV"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "Packaged: ${IMAGE}:${VERSION} → ${digest}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifact
        run: |
          cosign sign --yes "$ARTIFACT_DIGEST"
          echo "Signed: $ARTIFACT_DIGEST"

  # Rebuild images only AFTER the source artifacts are published and signed —
  # this is what keeps build.yml from racing an unpublished src/<name> artifact.
  trigger-builds:
    name: Rebuild consuming images
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch build.yml
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build.yml',
              ref: 'main',
              inputs: { force_all: 'true' },
            });
