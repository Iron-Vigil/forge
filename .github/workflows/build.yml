name: Build Images

on:
  push:
    branches: [main]
    paths:
      - 'images/**'
      - 'base/**'
      - 'components/**'
  workflow_dispatch:
    inputs:
      image:
        description: 'Image name to build (e.g. web-nginx). Leave blank to build all changed.'
        required: false
        type: string
      force_all:
        description: 'Force rebuild of all images'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      image:
        required: false
        type: string
      force_all:
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  detect:
    name: Detect changed images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set_matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed images
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            images:
              - 'images/**'
            base:
              - 'base/**'
            components:
              - 'components/**'

      - name: Build image matrix
        id: set_matrix
        env:
          IMG: ${{ inputs.image }}
        run: |
          # Explicit input takes priority — via env, never interpolated into the shell
          if [ -n "$IMG" ]; then
            m=$(jq -nc --arg i "$IMG" '{image:[$i]}')
            echo "matrix=${m}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Force all
          if [ "${{ inputs.force_all }}" = "true" ] || \
             [ "${{ steps.changes.outputs.base }}" = "true" ] || \
             [ "${{ steps.changes.outputs.components }}" = "true" ]; then
            images=$(find images/ -name "image.pkr.hcl" -exec dirname {} \; | xargs -I{} basename {} | jq -Rnc '[inputs]')
            echo "matrix={\"image\":${images}}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Only changed image dirs
          changed=$(git diff --name-only HEAD~1 HEAD | grep '^images/' | cut -d/ -f2 | sort -u | jq -Rnc '[inputs]')
          if [ "$changed" = "[]" ]; then
            echo "matrix={\"image\":[]}" >> "$GITHUB_OUTPUT"
          else
            echo "matrix={\"image\":${changed}}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.image }}
    needs: detect
    if: needs.detect.outputs.matrix != '{"image":[]}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}

    outputs:
      image_ref: ${{ steps.build.outputs.image_ref }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Pull and verify source artifacts
        run: |
          components=$(awk '/^components:/{f=1;next} f && /^ *-/{print $2} f && !/^ *-/{exit}' \
            "images/${{ matrix.image }}/meta.yml")
          for comp in $components; do
            # APK-first: a component is only built from source when it has a
            # sources/<name>/ dir. Everything else installs from Alpine in its
            # own install.sh, so skip it here.
            [ -f "sources/${comp}/version" ] || continue
            binary=$(cat "sources/${comp}/binary")
            ver=$(cat "sources/${comp}/version")
            image="ghcr.io/iron-vigil/forge/src/${comp}"

            # Resolve the mutable tag to an immutable digest ONCE, then verify and
            # consume that exact digest — no tag re-resolution, no TOCTOU window.
            if ! digest=$(crane digest "${image}:${ver}" 2>/dev/null); then
              echo "::error::source artifact ${image}:${ver} not found in GHCR — run the Build Sources workflow first"
              exit 1
            fi
            ref="${image}@${digest}"

            echo "Verifying Cosign signature on ${ref}"
            # Exact identity, pinned to main — a source artifact is only trusted if
            # build-sources.yml signed it running on main (reviewed code). A signature
            # from the same workflow on any other branch is rejected.
            cosign verify "${ref}" \
              --certificate-identity="https://github.com/Iron-Vigil/forge/.github/workflows/build-sources.yml@refs/heads/main" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
              > /dev/null

            # FROM scratch artifact has no CMD/ENTRYPOINT — docker create needs a
            # command token even though the container is only cp'd from, never run.
            docker create --name "forge-src-${comp}" "${ref}" "/${binary}"
            mkdir -p "/tmp/forge-src/${comp}"
            docker cp "forge-src-${comp}:/${binary}" "/tmp/forge-src/${comp}/${binary}"
            docker rm "forge-src-${comp}"
            echo "Verified + staged: /tmp/forge-src/${comp}/${binary} (${ref})"
          done

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: latest

      - name: Packer init
        run: packer init images/${{ matrix.image }}/

      - name: Get image metadata
        id: meta
        run: |
          m="images/${{ matrix.image }}/meta.yml"
          # Published repo name + software-version tag come from meta; the dir
          # (matrix.image) is just the build key/path.
          name=$(grep '^name:'   "$m" | awk '{print $2}' | tr -d '"')
          tag=$(grep  '^tag:'    "$m" | awk '{print $2}' | tr -d '"')
          latest=$(grep '^latest:' "$m" | awk '{print $2}' | tr -d '"')
          # Optional per-image Alpine override — back-version images pin the older
          # (still-supported) Alpine branch that packages their runtime. Blank =
          # use the shared base/alpine.pkrvars.hcl pin.
          alpine=$(grep '^alpine_version:' "$m" | awk '{print $2}' | tr -d '"')
          echo "name=${name}"     >> "$GITHUB_OUTPUT"
          echo "tag=${tag}"       >> "$GITHUB_OUTPUT"
          echo "latest=${latest}" >> "$GITHUB_OUTPUT"
          echo "alpine=${alpine}" >> "$GITHUB_OUTPUT"

      - name: Build image
        id: build
        run: |
          # A per-image -var (after the var-file) overrides the shared alpine pin.
          alpine_override=""
          [ -n "${{ steps.meta.outputs.alpine }}" ] && \
            alpine_override="-var alpine_version=${{ steps.meta.outputs.alpine }}"

          packer build \
            -var-file=base/alpine.pkrvars.hcl \
            ${alpine_override} \
            -var "image_version=${{ steps.meta.outputs.tag }}" \
            -var "registry=ghcr.io/iron-vigil/forge" \
            images/${{ matrix.image }}/

          ref="ghcr.io/iron-vigil/forge/${{ steps.meta.outputs.name }}:${{ steps.meta.outputs.tag }}"
          echo "image_ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "Built: ${ref}"

      - name: Distroless strip
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          IMAGE="ghcr.io/iron-vigil/forge/${{ steps.meta.outputs.name }}"
          DESC=$(grep '^description:' "images/${{ matrix.image }}/meta.yml" | cut -d: -f2- | tr -d '"' | xargs)

          tags="-t ${IMAGE}:${TAG}"
          [ "${{ steps.meta.outputs.latest }}" = "true" ] && tags="${tags} -t ${IMAGE}:latest"

          docker build \
            --build-arg "BASE=${IMAGE}:${TAG}" \
            --build-arg "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg "VCS_REF=${{ github.sha }}" \
            --build-arg "IMAGE_VERSION=${TAG}" \
            --build-arg "IMAGE_DESCRIPTION=${DESC}" \
            --no-cache \
            ${tags} \
            -f "images/${{ matrix.image }}/Dockerfile.strip" \
            .

      - name: Push image
        run: |
          IMAGE="ghcr.io/iron-vigil/forge/${{ steps.meta.outputs.name }}"
          docker push "${IMAGE}:${{ steps.meta.outputs.tag }}"
          if [ "${{ steps.meta.outputs.latest }}" = "true" ]; then
            docker push "${IMAGE}:latest"
          fi

      - name: Get image digest
        id: digest
        run: |
          ref="ghcr.io/iron-vigil/forge/${{ steps.meta.outputs.name }}:${{ steps.meta.outputs.tag }}"
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' "$ref" 2>/dev/null || \
            docker inspect --format='{{.Id}}' "$ref")
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Trigger scan
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'scan.yml',
              ref: 'main',
              inputs: {
                image: '${{ matrix.image }}',
                image_name: '${{ steps.meta.outputs.name }}',
                image_ref: '${{ steps.build.outputs.image_ref }}',
                image_digest: '${{ steps.digest.outputs.digest }}',
                version: '${{ steps.meta.outputs.tag }}',
                is_latest: '${{ steps.meta.outputs.latest }}',
              }
            });
