name: Build Images

on:
  push:
    branches: [main]
    paths:
      - 'images/**'
      - 'base/**'
      - 'components/**'
  workflow_dispatch:
    inputs:
      image:
        description: 'Image name to build (e.g. web-nginx). Leave blank to build all changed.'
        required: false
        type: string
      force_all:
        description: 'Force rebuild of all images'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      image:
        required: false
        type: string
      force_all:
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  detect:
    name: Detect changed images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set_matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed images
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            images:
              - 'images/**'
            base:
              - 'base/**'
            components:
              - 'components/**'

      - name: Build image matrix
        id: set_matrix
        run: |
          # Explicit input takes priority
          if [ -n "${{ inputs.image }}" ]; then
            echo "matrix={\"image\":[\"${{ inputs.image }}\"]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Force all
          if [ "${{ inputs.force_all }}" = "true" ] || \
             [ "${{ steps.changes.outputs.base }}" = "true" ] || \
             [ "${{ steps.changes.outputs.components }}" = "true" ]; then
            images=$(find images/ -name "image.pkr.hcl" -exec dirname {} \; | xargs -I{} basename {} | jq -Rnc '[inputs]')
            echo "matrix={\"image\":${images}}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Only changed image dirs
          changed=$(git diff --name-only HEAD~1 HEAD | grep '^images/' | cut -d/ -f2 | sort -u | jq -Rnc '[inputs]')
          if [ "$changed" = "[]" ]; then
            echo "matrix={\"image\":[]}" >> "$GITHUB_OUTPUT"
          else
            echo "matrix={\"image\":${changed}}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.image }}
    needs: detect
    if: needs.detect.outputs.matrix != '{"image":[]}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}

    outputs:
      image_ref: ${{ steps.build.outputs.image_ref }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: latest

      - name: Packer init
        run: packer init images/${{ matrix.image }}/

      - name: Get image version
        id: version
        run: |
          ver=$(grep '^version:' images/${{ matrix.image }}/meta.yml | awk '{print $2}' | tr -d '"')
          echo "version=${ver}" >> "$GITHUB_OUTPUT"

      - name: Build image
        id: build
        run: |
          packer build \
            -var-file=base/alpine.pkrvars.hcl \
            -var "image_version=${{ steps.version.outputs.version }}" \
            -var "registry=ghcr.io/iron-vigil/forge" \
            images/${{ matrix.image }}/

          ref="ghcr.io/iron-vigil/forge/${{ matrix.image }}:${{ steps.version.outputs.version }}"
          echo "image_ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "Built: ${ref}"

      - name: Push image
        run: |
          docker push ghcr.io/iron-vigil/forge/${{ matrix.image }}:${{ steps.version.outputs.version }}
          docker push ghcr.io/iron-vigil/forge/${{ matrix.image }}:latest

      - name: Get image digest
        id: digest
        run: |
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' \
            ghcr.io/iron-vigil/forge/${{ matrix.image }}:${{ steps.version.outputs.version }} 2>/dev/null || \
            docker inspect --format='{{.Id}}' \
            ghcr.io/iron-vigil/forge/${{ matrix.image }}:${{ steps.version.outputs.version }})
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Trigger scan
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'scan.yml',
              ref: 'main',
              inputs: {
                image: '${{ matrix.image }}',
                image_ref: '${{ steps.build.outputs.image_ref }}',
                version: '${{ steps.version.outputs.version }}',
              }
            });
