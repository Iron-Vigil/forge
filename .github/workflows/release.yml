name: Release Image

on:
  workflow_dispatch:
    inputs:
      image:
        description: 'Image dir / build key (for meta path + artifact names)'
        required: true
        type: string
      image_name:
        description: 'Published repo name (e.g. hardened-nginx)'
        required: true
        type: string
      image_ref:
        description: 'Full image ref with tag'
        required: true
        type: string
      version:
        description: 'Image version'
        required: true
        type: string
      scan_run_id:
        description: 'Run ID of the scan workflow (for artifact download)'
        required: true
        type: string
      image_digest:
        description: 'Full image ref with digest (passed from scan, avoids a GHCR pull here)'
        required: false
        type: string

permissions:
  contents: write
  packages: read

jobs:
  release:
    name: Release ${{ inputs.image }} v${{ inputs.version }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download scan artifacts
        uses: actions/download-artifact@v4
        with:
          name: scan-${{ inputs.image }}-${{ inputs.version }}
          path: reports/
          run-id: ${{ inputs.scan_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get image digest
        id: digest
        run: |
          digest="${{ inputs.image_digest }}"
          if [ -z "$digest" ]; then
            digest="${{ inputs.image_ref }}"
          fi
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Build CVE detail sections
        id: cve_detail
        run: |
          report=reports/grype-report.json

          # One collapsed <details> per severity, deduped by CVE id, each line
          # "- [id](advisory-link) — short desc". Emitted as a multiline output.
          section() {
            sev="$1"
            items=$(jq -r --arg sev "$sev" '
              [ .matches[]
                | select(.vulnerability.severity == $sev)
                | { id:  .vulnerability.id,
                    url: (if (.vulnerability.dataSource // "") == "" then "https://osv.dev/vulnerability/" + .vulnerability.id else .vulnerability.dataSource end),
                    desc:(.vulnerability.description // "") } ]
              | unique_by(.id)
              | sort_by(.id)
              | .[]
              | "- [\(.id)](\(.url))"
                + (if .desc == "" then "" else " — " + (.desc | gsub("[\r\n]+"; " ") | .[0:160]) end)
            ' "$report")
            n=$(printf "%s\n" "$items" | grep -c . || true)
            if [ "$n" -eq 0 ]; then
              printf "<details><summary>%s (0)</summary>\n\nnone\n</details>\n\n" "$sev"
            else
              printf "<details><summary>%s (%s)</summary>\n\n%s\n\n</details>\n\n" "$sev" "$n" "$items"
            fi
          }

          {
            echo "md<<GRYPE_EOF"
            section Critical
            section High
            section Medium
            section Low
            echo "GRYPE_EOF"
          } >> "$GITHUB_OUTPUT"

          # Waived findings: what security/grype.yaml suppressed FOR THIS IMAGE
          # (grype's ignoredMatches), deduped by CVE, with the affected packages and
          # the rationale from the applied rule. Documents that these were evaluated
          # and deemed not-affected, not silently dropped. One CVE ignored across
          # several packages (e.g. the busybox family) collapses to one line and
          # shows the substantive reason (the longest of the per-package rules).
          waived=$(jq -r '
            [ (.ignoredMatches // [])[]
              | { id:  .vulnerability.id,
                  url: (if (.vulnerability.dataSource // "") == "" then "https://osv.dev/vulnerability/" + .vulnerability.id else .vulnerability.dataSource end),
                  pkg: .artifact.name,
                  reason: (.appliedIgnoreRules[0].reason // "") } ]
            | group_by(.id)
            | map({ id: .[0].id, url: .[0].url,
                    pkgs: (map(.pkg) | unique | join(", ")),
                    reason: (max_by(.reason | length).reason // "") })
            | sort_by(.id)
            | .[]
            | "- [\(.id)](\(.url)) — `\(.pkgs)` — \(.reason | gsub("[\r\n]+"; " "))"
          ' "$report")
          wn=$(printf "%s\n" "$waived" | grep -c . || true)
          {
            echo "waived<<WAIVED_EOF"
            if [ "$wn" -gt 0 ]; then
              printf '### Waived CVEs (not affected)\n\n'
              printf 'Suppressed via `security/grype.yaml` with the rationale below. These were evaluated and judged not applicable to this image, not silently dropped; each is scoped to the named package and dated for review.\n\n'
              printf '<details><summary>Waived (%s)</summary>\n\n%s\n\n</details>\n' "$wn" "$waived"
            fi
            echo "WAIVED_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Get Alpine version
        id: alpine
        run: |
          # Per-image override (back-version images) wins; else the shared pin.
          ver=$(grep '^alpine_version:' "images/${{ inputs.image }}/meta.yml" | awk '{print $2}' | tr -d '"')
          [ -z "$ver" ] && ver=$(grep 'alpine_version' base/alpine.pkrvars.hcl | cut -d'"' -f2)
          echo "version=${ver}" >> "$GITHUB_OUTPUT"

      - name: Get components list
        id: components
        run: |
          comps=$(awk '/^components:/{f=1;next} f && /^ *-/{print $2} f && !/^ *-/{exit}' images/${{ inputs.image }}/meta.yml | tr '\n' ' ')
          echo "list=${comps}" >> "$GITHUB_OUTPUT"

      - name: Stage release assets
        run: |
          d=reports
          i="${{ inputs.image }}"
          v="${{ inputs.version }}"
          cp "$d/grype-report.json"   "$d/grype-report-${i}-${v}.json"
          cp "$d/sbom.spdx.json"      "$d/sbom-${i}-${v}.spdx.json"
          cp "$d/sbom.cyclonedx.json" "$d/sbom-${i}-${v}.cyclonedx.json"
          cp "$d/grype-summary.txt"   "$d/grype-summary-${i}-${v}.txt"

      - name: Create/update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.image_name }}/v${{ inputs.version }}
          name: ${{ inputs.image_name }} v${{ inputs.version }}
          # upsert — re-running refreshes an existing release's body and assets
          body: |
            ## ${{ inputs.image_name }} v${{ inputs.version }}

            ### Pull

            ```
            docker pull ${{ inputs.image_ref }}
            ```

            **Digest:** `${{ steps.digest.outputs.digest }}`

            ### Verify signature

            ```
            cosign verify ghcr.io/iron-vigil/forge/${{ inputs.image_name }}:${{ inputs.version }} \
              --certificate-identity-regexp="https://github.com/Iron-Vigil/forge" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com"
            ```

            ### Build info

            | | |
            |---|---|
            | Alpine base | `${{ steps.alpine.outputs.version }}` |
            | Components | `${{ steps.components.outputs.list }}` |
            | Built by | Actions run [`${{ github.run_id }}`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
            | Commit | `${{ github.sha }}` |

            ### CVEs (Grype)

            Deduped by CVE id, grouped by severity (collapsed — click to expand). Full report and SBOM attached below; SARIF is in the [Security tab](../../security/code-scanning).

            ${{ steps.cve_detail.outputs.md }}
            ${{ steps.cve_detail.outputs.waived }}
          files: |
            reports/grype-report-${{ inputs.image }}-${{ inputs.version }}.json
            reports/sbom-${{ inputs.image }}-${{ inputs.version }}.spdx.json
            reports/sbom-${{ inputs.image }}-${{ inputs.version }}.cyclonedx.json
            reports/grype-summary-${{ inputs.image }}-${{ inputs.version }}.txt
          draft: false
          prerelease: false
