name: Scan Image

on:
  workflow_dispatch:
    inputs:
      image:
        description: 'Image name (e.g. web-nginx)'
        required: true
        type: string
      image_ref:
        description: 'Full image ref with tag'
        required: true
        type: string
      version:
        description: 'Image version'
        required: true
        type: string

permissions:
  contents: read
  packages: read
  security-events: write
  id-token: write   # for Cosign keyless signing
  actions: write    # for triggering release workflow

jobs:
  scan:
    name: Scan ${{ inputs.image }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull ${{ inputs.image_ref }}

      - name: Create reports dir
        run: mkdir -p ./reports

      # SBOM generation with Syft
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ inputs.image_ref }}
          artifact-name: sbom-${{ inputs.image }}-${{ inputs.version }}.spdx.json
          output-file: ./reports/sbom.spdx.json
          format: spdx-json

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ inputs.image_ref }}
          artifact-name: sbom-${{ inputs.image }}-${{ inputs.version }}.cyclonedx.json
          output-file: ./reports/sbom.cyclonedx.json
          format: cyclonedx-json

      # CVE scan with Grype against the SPDX SBOM
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Grype scan — SARIF (GitHub Security tab)
        run: |
          grype sbom:./reports/sbom.spdx.json \
            --config security/grype.yaml \
            --output sarif \
            --file ./reports/grype.sarif

      - name: Grype scan — JSON report
        run: |
          grype sbom:./reports/sbom.spdx.json \
            --config security/grype.yaml \
            --output json \
            --file ./reports/grype-report.json

      - name: Grype scan — table (summary)
        run: |
          grype sbom:./reports/sbom.spdx.json \
            --config security/grype.yaml \
            --output table \
            --file ./reports/grype-summary.txt
          cat ./reports/grype-summary.txt

      - name: Fail on CRITICAL vulnerabilities
        run: |
          crits=$(jq '[.matches[] | select(.vulnerability.severity == "Critical")] | length' ./reports/grype-report.json)
          echo "Critical vulnerabilities found: ${crits}"
          if [ "$crits" -gt 0 ]; then
            echo "Build failed — ${crits} CRITICAL CVE(s) must be resolved before release"
            jq -r '.matches[] | select(.vulnerability.severity == "Critical") | "\(.vulnerability.id) \(.artifact.name) \(.artifact.version) — \(.vulnerability.description // "no description")"' ./reports/grype-report.json
            exit 1
          fi

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ./reports/grype.sarif
          category: grype-${{ inputs.image }}

      # Cosign keyless signing — tied to this Actions run identity
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes ${{ inputs.image_ref }}
          echo "Image signed with keyless Cosign (Sigstore OIDC)"

      # Attach SBOM to image in GHCR
      - name: Attach SBOM to image
        run: |
          cosign attach sbom --sbom ./reports/sbom.spdx.json ${{ inputs.image_ref }}

      # Archive reports for release attachment
      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scan-${{ inputs.image }}-${{ inputs.version }}
          path: reports/
          retention-days: 90

      - name: Trigger release
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release.yml',
              ref: 'main',
              inputs: {
                image: '${{ inputs.image }}',
                image_ref: '${{ inputs.image_ref }}',
                version: '${{ inputs.version }}',
                scan_run_id: String(context.runId),
              }
            });
