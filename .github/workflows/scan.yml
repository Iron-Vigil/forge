name: Scan Image

on:
  workflow_dispatch:
    inputs:
      image:
        description: 'Image name (e.g. web-nginx)'
        required: true
        type: string
      image_ref:
        description: 'Full image ref with tag (e.g. ghcr.io/iron-vigil/forge/web-nginx:0.1.0)'
        required: true
        type: string
      image_digest:
        description: 'Full image ref with digest — used for Cosign signing'
        required: false
        type: string
      version:
        description: 'Image version'
        required: true
        type: string

permissions:
  contents: read
  packages: write  # cosign sign pushes signature blobs to GHCR
  security-events: write
  id-token: write   # for Cosign keyless signing
  actions: write    # for triggering release workflow

jobs:
  scan:
    name: Scan ${{ inputs.image }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull ${{ inputs.image_ref }}

      - name: Create reports dir
        run: mkdir -p ./reports

      # SBOM generation with Syft
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ inputs.image_ref }}
          artifact-name: sbom-${{ inputs.image }}-${{ inputs.version }}.spdx.json
          output-file: ./reports/sbom.spdx.json
          format: spdx-json

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ inputs.image_ref }}
          artifact-name: sbom-${{ inputs.image }}-${{ inputs.version }}.cyclonedx.json
          output-file: ./reports/sbom.cyclonedx.json
          format: cyclonedx-json

      # CVE scan with Grype against the SPDX SBOM
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Grype scan — SARIF (GitHub Security tab)
        run: |
          grype sbom:./reports/sbom.spdx.json \
            --config security/grype.yaml \
            --output sarif \
            --file ./reports/grype.sarif

      - name: Grype scan — JSON report
        run: |
          grype sbom:./reports/sbom.spdx.json \
            --config security/grype.yaml \
            --output json \
            --file ./reports/grype-report.json

      - name: Grype scan — table (summary)
        run: |
          grype sbom:./reports/sbom.spdx.json \
            --config security/grype.yaml \
            --output table \
            --file ./reports/grype-summary.txt
          cat ./reports/grype-summary.txt

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Relabel image with CVE summary
        id: relabeled
        run: |
          # Count unique CVE ids per severity so the counts match the listed CVEs
          # (the same CVE can span multiple packages).
          crits=$(jq '[.matches[] | select(.vulnerability.severity == "Critical") | .vulnerability.id] | unique | length' ./reports/grype-report.json)
          highs=$(jq '[.matches[] | select(.vulnerability.severity == "High") | .vulnerability.id] | unique | length' ./reports/grype-report.json)
          mediums=$(jq '[.matches[] | select(.vulnerability.severity == "Medium") | .vulnerability.id] | unique | length' ./reports/grype-report.json)
          lows=$(jq '[.matches[] | select(.vulnerability.severity == "Low") | .vulnerability.id] | unique | length' ./reports/grype-report.json)

          BASE_DESC=$(grep '^description:' "images/${{ inputs.image }}/meta.yml" | cut -d: -f2- | tr -d '"' | xargs)

          # Deduped, severity-sorted list of the CVEs Grype found, each with its
          # advisory link (falls back to osv.dev when Grype has no dataSource).
          cve_list=$(jq -r '
            [ .matches[] | {id: .vulnerability.id, sev: .vulnerability.severity, url: (.vulnerability.dataSource // "")} ]
            | unique_by(.id)
            | sort_by({"Critical":0,"High":1,"Medium":2,"Low":3,"Negligible":4,"Unknown":5}[.sev] // 9)
            | .[]
            | "\(.id) (\(.sev)) " + (if .url == "" then "https://osv.dev/vulnerability/\(.id)" else .url end)
          ' ./reports/grype-report.json)

          # Cap the list so a noisy image cannot produce a multi-KB label.
          cap=25
          total=$(printf '%s\n' "$cve_list" | grep -c . || true)
          if [ "$total" -eq 0 ]; then
            cves="none"
          elif [ "$total" -gt "$cap" ]; then
            cves="$(printf '%s\n' "$cve_list" | head -n "$cap" | sed ':a;N;$!ba;s/\n/; /g'); +$((total - cap)) more"
          else
            cves="$(printf '%s\n' "$cve_list" | sed ':a;N;$!ba;s/\n/; /g')"
          fi

          DESC="${BASE_DESC} — Critical:${crits} High:${highs} Medium:${mediums} Low:${lows} | Grype $(date -u +%Y-%m-%d) | CVEs: ${cves}"

          IMAGE="ghcr.io/iron-vigil/forge/${{ inputs.image }}"

          crane mutate "${IMAGE}:${{ inputs.version }}" \
            --label "org.opencontainers.image.description=${DESC}"
          crane tag "${IMAGE}:${{ inputs.version }}" latest

          digest=$(crane digest "${IMAGE}:${{ inputs.version }}")
          echo "digest=${IMAGE}@${digest}" >> "$GITHUB_OUTPUT"
          echo "Relabeled ${IMAGE}:${{ inputs.version }} → ${IMAGE}@${digest}"
          echo "Description: ${DESC}"

      - name: Fail on CRITICAL vulnerabilities
        run: |
          crits=$(jq '[.matches[] | select(.vulnerability.severity == "Critical")] | length' ./reports/grype-report.json)
          echo "Critical vulnerabilities found: ${crits}"
          if [ "$crits" -gt 0 ]; then
            echo "Build failed — ${crits} CRITICAL CVE(s) must be resolved before release"
            jq -r '.matches[] | select(.vulnerability.severity == "Critical") | "\(.vulnerability.id) \(.artifact.name) \(.artifact.version) — \(.vulnerability.description // "no description")"' ./reports/grype-report.json
            exit 1
          fi

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ./reports/grype.sarif
          category: grype-${{ inputs.image }}

      # Cosign keyless signing — tied to this Actions run identity
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          ref="${{ steps.relabeled.outputs.digest }}"
          [ -z "$ref" ] && ref="${{ inputs.image_digest }}"
          [ -z "$ref" ] && ref="${{ inputs.image_ref }}"
          cosign sign --yes "$ref"
          echo "Image signed: $ref"

      # Attach SBOM to image in GHCR
      - name: Attach SBOM to image
        run: |
          ref="${{ steps.relabeled.outputs.digest }}"
          [ -z "$ref" ] && ref="${{ inputs.image_digest }}"
          [ -z "$ref" ] && ref="${{ inputs.image_ref }}"
          cosign attach sbom --sbom ./reports/sbom.spdx.json "$ref"

      # Archive reports for release attachment
      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scan-${{ inputs.image }}-${{ inputs.version }}
          path: reports/
          retention-days: 90

      - name: Trigger release
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release.yml',
              ref: 'main',
              inputs: {
                image: '${{ inputs.image }}',
                image_ref: '${{ inputs.image_ref }}',
                image_digest: '${{ steps.relabeled.outputs.digest || inputs.image_digest }}',
                version: '${{ inputs.version }}',
                scan_run_id: String(context.runId),
              }
            });
