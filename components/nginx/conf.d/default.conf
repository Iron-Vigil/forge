# Default server block — replace or extend in downstream images
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root  /var/www/html;
    index index.html;

    # Drop requests with no matching Host header
    if ($host = "") {
        return 444;
    }

    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Block common exploit paths
    location ~ /\. {
        deny all;
    }

    location ~ ~$ {
        deny all;
    }
}
