[www]
; master + workers run as the non-root app user (uid 1000). Not running as root,
; so fpm keeps workers as the current user; user/group here document intent.
user = app
group = app

; FastCGI on all interfaces so a separate nginx container/pod can reach fpm.
; php-fpm has no auth of its own — keep it on a trusted network.
listen = 0.0.0.0:9000

pm = dynamic
pm.max_children = 16
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests = 500

; Container logging: worker output + PHP errors to stdout/stderr (fpm runs -F).
catch_workers_output = yes
decorate_workers_output = no
clear_env = no
access.log = /dev/stdout
php_admin_value[error_log] = /dev/stderr
php_admin_flag[log_errors] = on
