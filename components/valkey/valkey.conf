# Valkey hardened config — ImageFactory
# Designed for container use: no persistence, stdout logging, all interfaces.
#
# requirepass is NOT set here. Set it at runtime:
#   docker run ... cache-valkey valkey-server /etc/valkey/valkey.conf --requirepass yourpassword
# Or mount your own config that extends this one.

################################## NETWORK #####################################

bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 60

# protected-mode requires either a password or loopback-only bind.
# Containers rely on network-level isolation (k8s NetworkPolicy, Docker networks).
# Set requirepass if deploying without external network controls.
protected-mode no

################################## GENERAL #####################################

daemonize no
loglevel notice
logfile ""
databases 16

################################## SNAPSHOTTING (DISABLED) #####################

# Pure cache use case — no RDB snapshots.
# Mount a custom config to enable persistence.
save ""
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /var/lib/valkey

################################## APPEND ONLY (DISABLED) ######################

appendonly no
appendfilename "appendonly.aof"

################################## MEMORY #####################################

# No maxmemory limit set — set this at runtime via --maxmemory.
# Policy: evict any key when memory limit is hit (cache behavior).
maxmemory-policy allkeys-lru
maxmemory-samples 5

################################## SECURITY ####################################

# Disable DEBUG — allows arbitrary memory inspection and crash-forcing.
rename-command DEBUG ""

# Keep FLUSHALL, CONFIG, SHUTDOWN available — document access control separately.
# If you need to disable more commands, add rename-command directives here
# or in a mounted config fragment under /etc/valkey/valkey.d/.

################################## SLOW LOG ####################################

slowlog-log-slower-than 10000
slowlog-max-len 128

################################## LATENCY MONITORING ##########################

latency-monitor-threshold 0

################################## CLIENTS #####################################

maxclients 10000
